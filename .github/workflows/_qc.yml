# Reusable deterministic acceptance workflow. It runs the consuming repo's
# standardized test-ci recipe; commit and push tiers remain local hooks.
# Downstream recipes delegate to the selected ai-review-ci profile.
name: QC (reusable)

# The workflow executes the selected consuming-repository recipe; all tool
# ownership stays in the delegated profile justfile.

on:
  workflow_call:
    inputs:
      tier:
        description: 'QC tier: test-ci (PR acceptance gate) or ambient (scheduled full-repo debt audit)'
        required: true
        type: string
      infra_ref:
        description: 'Git ref of ai-review-ci whose justfiles back the delegated recipes'
        required: false
        type: string
        default: main
      run_gh_boundary:
        description: "Run this repository's real GitHub API tests marked pytest.mark.gh_boundary in an isolated token-scoped step"
        required: false
        type: boolean
        default: false

jobs:
  qc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The suite includes real-boundary tests that read labels via gh
      # (GET /repos/{owner}/{repo}/labels is issue-scoped). No-mock policy
      # forbids faking this boundary, so QC reads it for real.
      issues: read
    env:
      QC_TIER: ${{ inputs.tier }}
      QC_INFRA_REF: ${{ inputs.infra_ref }}
      # _diff-cover compares changed lines against this ref. A CI checkout is a
      # detached merge ref with no local `main`, so point at the remote-tracking
      # base branch (the PR base on PRs, the default branch on pushes).
      DIFF_COVER_BASE: origin/${{ github.base_ref || github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          case "$QC_TIER" in
            test-ci|ambient) ;;
            *) echo "invalid tier: $QC_TIER" >&2; exit 1 ;;
          esac
          if [[ -z "$QC_INFRA_REF" || "$QC_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $QC_INFRA_REF" >&2
            exit 1
          fi

      - name: Clone QC infrastructure
        # Scaffold justfiles delegate to ~/ai-review-ci/justfiles/<profile>.just.
        # ai-review-ci's own justfile uses its checkout, so this clone is a
        # no-op for the self case but keeps the workflow uniform for downstream.
        run: git clone --depth 1 --branch "$QC_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$HOME/ai-review-ci"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install just
        # Use the maintained action's authenticated resolver instead of the
        # former hand-rolled release lookup, which could hit anonymous API
        # limits and fail after downloading an error payload.
        uses: extractions/setup-just@v4
        with:
          github-token: ${{ github.token }}

      - name: Install QC system packages
        # The QC file-discovery recipes (_python-qc-files etc.) shell out to `rg`.
        # Dev machines have it on PATH; a bare runner does not, so install it
        # explicitly — same contract for downstream consumers of this workflow.
        run: sudo apt-get update && sudo apt-get install -y pandoc ripgrep

      - name: Install bun
        # Some QC profiles (and ai-review-ci's own suite) drive JS tooling
        # configs through bun; node ships on the runner, bun does not.
        uses: oven-sh/setup-bun@v2

      - name: Run QC tier
        # No GH_TOKEN here (#218): the tier runs every QC recipe and every
        # npx/uvx tool runner (semgrep, ai-slop, aislop), which must not execute
        # with the token in their environment. The gh-dependent label tests are
        # deselected from this run (gh_boundary marker) and run in the isolated
        # token-scoped step below.
        #
        # Environment config (#300): every repo's .envrc is the declared config
        # surface for constants factored out of code, inheriting the global
        # ~/.envrc (which sets DIRENV_CONFIGURED_CORRECTLY on dev machines).
        # Runners have no direnv, so reproduce the same chain for real:
        # provision the global stub, then source the repo's .envrc into the QC
        # environment so its constants are actually present — never just stamp
        # the marker. A missing .envrc is reported by _check-envrc itself.
        run: |
          printf 'export DIRENV_CONFIGURED_CORRECTLY=1\n' > "$HOME/.envrc"
          source_up() { . "$HOME/.envrc"; }  # direnv builtin, mapped for bash
          set -a
          [ -f .envrc ] && . .envrc
          set +a
          just "$QC_TIER"

      - name: Run gh-boundary tests
        # Least privilege (#218): an explicit downstream opt-in scopes the
        # token to this step alone. The canonical Python profile recipe runs
        # exactly the gh_boundary-marked tests the standard tier deselects.
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$HOME/ai-review-ci/justfiles/python.just" -d . test-gh-boundary
        if: inputs.run_gh_boundary
