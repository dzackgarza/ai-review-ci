name: AI Review (reusable)

on:
  workflow_call:
    inputs:
      report_type:
        description: 'Review type: general or slop'
        required: true
        type: string
      scope:
        description: 'Review scope: repo or diff'
        required: true
        type: string
      fail_below:
        description: 'Fail the run if the health score drops below this value'
        required: false
        type: string
        default: ''
      infra_ref:
        description: 'Git ref of ai-review-ci to run with'
        required: false
        type: string
        default: 'main'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        # The `runner` context is unavailable in job-level `env`; export the
        # path once so every later step's shell sees $INFRA.
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "${{ inputs.infra_ref }}" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install tools
        run: just -f "$INFRA/ci/runner.just" install-tools

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" fetch-context "ai-review/${{ inputs.report_type }}" "${{ github.event.number || 0 }}"

      - name: Prepare reviewer
        run: just -f "$INFRA/ci/runner.just" prepare

      - name: Stage PR diff
        if: inputs.scope == 'diff'
        run: just -f "$INFRA/ci/runner.just" stage-pr-diff "${{ github.base_ref }}"

      - name: Run review
        run: just -f "$INFRA/ci/runner.just" run-review "${{ inputs.report_type }}" "${{ inputs.scope }}"

      - name: Collect review output
        run: just -f "$INFRA/ci/runner.just" collect-output

      - name: Convert report to SARIF
        run: just -f "$INFRA/ci/runner.just" convert-sarif "ai-${{ inputs.report_type }}-review"

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .review-report.sarif
          category: ai-${{ inputs.report_type }}-review

      - name: Post review threads
        if: inputs.scope == 'diff'
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" post-threads "${{ github.event.number }}"

      - name: Check threshold
        if: inputs.fail_below != ''
        run: |
          tier1=$(jq '[.findings[] | select(.tier == "tier1")] | length' .review-report-artifact.json)
          tier2=$(jq '[.findings[] | select(.tier == "tier2")] | length' .review-report-artifact.json)
          score=$((100 - tier1 * 20 - tier2 * 5))
          score=$(( score < 0 ? 0 : score ))
          if [ "$score" -lt "${{ inputs.fail_below }}" ]; then
            echo "Health score $score is below threshold ${{ inputs.fail_below }}"
            exit 1
          fi
