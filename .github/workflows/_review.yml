name: AI Review (reusable)

on:
  workflow_call:
    inputs:
      report_type:
        description: 'Review type: general or slop'
        required: true
        type: string
      scope:
        description: 'Review scope: repo or diff'
        required: true
        type: string
      infra_ref:
        description: 'Git ref of ai-review-ci to run with'
        required: false
        type: string
        default: 'main'
      advisory:
        description: 'Advisory mode: findings are published to the ledger but never fail the run'
        required: false
        type: boolean
        default: false
      policy_paths:
        description: 'Newline-delimited repo-relative policy documents inlined into the reviewer prompt'
        required: false
        type: string
        default: ''
      focus_prompt:
        description: 'Short repo-specific review-focus instructions inlined into the reviewer prompt'
        required: false
        type: string
        default: ''
      context_archive:
        description: 'Repo-relative tar archive (the repo-assembled review packet) exploded into .review-context/ in the reviewer repo; its PROMPT.md and Markdown documents are inlined into the reviewer prompt'
        required: false
        type: string
        default: ''
      delivery:
        description: 'Findings ledger: sarif (code scanning) or issues (fingerprint-tracked GitHub issues; requires issues: write)'
        required: false
        type: string
        default: 'sarif'
      parent_issue:
        description: 'Grouping issue number new issue-ledger findings are attached under as sub-issues (issues delivery only; 0 = none)'
        required: false
        type: number
        default: 0

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
      issues: write
    env:
      REVIEW_REPORT_TYPE: ${{ inputs.report_type }}
      REVIEW_SCOPE: ${{ inputs.scope }}
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
      REVIEW_PR_NUMBER: ${{ github.event.number || 0 }}
      REVIEW_BASE_REF: ${{ github.base_ref }}
      REVIEW_POLICY_PATHS: ${{ inputs.policy_paths }}
      REVIEW_FOCUS_PROMPT: ${{ inputs.focus_prompt }}
      REVIEW_CONTEXT_ARCHIVE: ${{ inputs.context_archive }}
      REVIEW_DELIVERY: ${{ inputs.delivery }}
      REVIEW_PARENT_ISSUE: ${{ inputs.parent_issue }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        # The `runner` context is unavailable in job-level `env`; export the
        # path once so every later step's shell sees $INFRA.
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate review inputs
        run: |
          case "$REVIEW_REPORT_TYPE" in
            general|slop) ;;
            *) echo "invalid report_type: $REVIEW_REPORT_TYPE" >&2; exit 1 ;;
          esac
          case "$REVIEW_SCOPE" in
            repo|diff) ;;
            *) echo "invalid scope: $REVIEW_SCOPE" >&2; exit 1 ;;
          esac
          if [[ ! "$REVIEW_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "invalid pull request number: $REVIEW_PR_NUMBER" >&2
            exit 1
          fi
          if [[ -z "$REVIEW_INFRA_REF" || "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi
          if [[ "$REVIEW_BASE_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid base_ref: $REVIEW_BASE_REF" >&2
            exit 1
          fi
          if [[ "$REVIEW_SCOPE" == "diff" && -z "$REVIEW_BASE_REF" ]]; then
            echo "base_ref is required for diff scope" >&2
            exit 1
          fi
          case "$REVIEW_DELIVERY" in
            sarif|issues) ;;
            *) echo "invalid delivery: $REVIEW_DELIVERY" >&2; exit 1 ;;
          esac
          if [[ ! "$REVIEW_PARENT_ISSUE" =~ ^[0-9]+$ ]]; then
            echo "invalid parent_issue: $REVIEW_PARENT_ISSUE" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        # Authenticated install via the maintained action. Mirrors _qc.yml.
        uses: extractions/setup-just@v4
        with:
          github-token: ${{ github.token }}

      - name: Install tools
        run: just -f "$INFRA/ci/runner.just" install-tools

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" fetch-context "ai-review/$REVIEW_REPORT_TYPE" "$REVIEW_PR_NUMBER"

      - name: Prepare reviewer
        run: just -f "$INFRA/ci/runner.just" prepare

      - name: Stage PR diff
        if: inputs.scope == 'diff'
        run: just -f "$INFRA/ci/runner.just" stage-pr-diff "$REVIEW_BASE_REF"

      - name: Stage review context packet
        if: inputs.context_archive != ''
        run: just -f "$INFRA/ci/runner.just" stage-context-packet "$REVIEW_CONTEXT_ARCHIVE"

      - name: Run review
        run: just -f "$INFRA/ci/runner.just" run-review "$REVIEW_REPORT_TYPE" "$REVIEW_SCOPE"

      - name: Collect review output
        run: just -f "$INFRA/ci/runner.just" collect-output

      - name: Write structured review state
        run: just -f "$INFRA/ci/runner.just" write-review-state

      - name: Upload structured review state
        uses: actions/upload-artifact@v4
        with:
          name: ai-${{ inputs.report_type }}-review-state
          path: .review-findings.json

      - name: Convert report to SARIF
        if: inputs.delivery == 'sarif'
        run: just -f "$INFRA/ci/runner.just" convert-sarif "ai-$REVIEW_REPORT_TYPE-review"

      - name: Upload review findings
        if: inputs.delivery == 'sarif'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .review-report.sarif
          category: ai-${{ inputs.report_type }}-review

      - name: Publish findings to the issues ledger
        if: inputs.delivery == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" publish-issues "$REVIEW_PARENT_ISSUE"

      - name: Post review threads
        if: inputs.scope == 'diff'
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" post-threads "$REVIEW_PR_NUMBER"

      - name: Enforce review status
        # Advisory runs publish the ledger snapshot but never let findings
        # determine the workflow conclusion; infrastructure failures in the
        # earlier steps still fail the run.
        if: ${{ !inputs.advisory }}
        run: just -f "$INFRA/ci/runner.just" enforce-review-status
