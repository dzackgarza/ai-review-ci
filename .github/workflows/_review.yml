name: AI Review (reusable)

on:
  workflow_call:
    inputs:
      report_type:
        description: 'Review type: general or slop'
        required: true
        type: string
      scope:
        description: 'Review scope: repo or diff'
        required: true
        type: string
      infra_ref:
        description: 'Git ref of ai-review-ci to run with'
        required: false
        type: string
        default: 'main'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    env:
      REVIEW_REPORT_TYPE: ${{ inputs.report_type }}
      REVIEW_SCOPE: ${{ inputs.scope }}
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
      REVIEW_PR_NUMBER: ${{ github.event.number || 0 }}
      REVIEW_BASE_REF: ${{ github.base_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        # The `runner` context is unavailable in job-level `env`; export the
        # path once so every later step's shell sees $INFRA.
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate review inputs
        run: |
          case "$REVIEW_REPORT_TYPE" in
            general|slop) ;;
            *) echo "invalid report_type: $REVIEW_REPORT_TYPE" >&2; exit 1 ;;
          esac
          case "$REVIEW_SCOPE" in
            repo|diff) ;;
            *) echo "invalid scope: $REVIEW_SCOPE" >&2; exit 1 ;;
          esac
          if [[ ! "$REVIEW_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "invalid pull request number: $REVIEW_PR_NUMBER" >&2
            exit 1
          fi
          if [[ -z "$REVIEW_INFRA_REF" || "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi
          if [[ "$REVIEW_BASE_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid base_ref: $REVIEW_BASE_REF" >&2
            exit 1
          fi
          if [[ "$REVIEW_SCOPE" == "diff" && -z "$REVIEW_BASE_REF" ]]; then
            echo "base_ref is required for diff scope" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install tools
        run: just -f "$INFRA/ci/runner.just" install-tools

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" fetch-context "ai-review/$REVIEW_REPORT_TYPE" "$REVIEW_PR_NUMBER"

      - name: Prepare reviewer
        run: just -f "$INFRA/ci/runner.just" prepare

      - name: Stage PR diff
        if: inputs.scope == 'diff'
        run: just -f "$INFRA/ci/runner.just" stage-pr-diff "$REVIEW_BASE_REF"

      - name: Run review
        run: just -f "$INFRA/ci/runner.just" run-review "$REVIEW_REPORT_TYPE" "$REVIEW_SCOPE"

      - name: Collect review output
        run: just -f "$INFRA/ci/runner.just" collect-output

      - name: Convert report to SARIF
        run: just -f "$INFRA/ci/runner.just" convert-sarif "ai-$REVIEW_REPORT_TYPE-review"

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .review-report.sarif
          category: ai-${{ inputs.report_type }}-review

      - name: Post review threads
        if: inputs.scope == 'diff'
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" post-threads "$REVIEW_PR_NUMBER"
