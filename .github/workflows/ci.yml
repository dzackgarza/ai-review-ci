# Authoritative remote acceptance tier (just test-ci). Local pre-commit and
# pre-push hooks run test-commit and test-push respectively.
name: CI

# ai-review-ci dogfoods the same required test-ci workflow installed in downstream
# pull requests. Local test-commit and test-push remain hook boundaries; this
# workflow owns remote acceptance. The ambient debt audit remains separate.

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  qc-ci:
    uses: ./.github/workflows/_qc.yml
    permissions:
      contents: read
      # Granted through to _qc.yml, whose suite reads labels via gh (issue-scoped).
      issues: read
    with:
      tier: test-ci
