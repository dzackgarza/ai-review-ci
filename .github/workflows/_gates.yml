name: AI Review Gates (reusable)

on:
  workflow_call:
    inputs:
      gate:
        description: 'Gate to run: deterministic-diff, delegation-conformance, app-boot, or thread-resolution'
        required: true
        type: string
      infra_ref:
        description: 'Git ref of ai-review-ci to run with'
        required: false
        type: string
        default: 'main'

jobs:
  deterministic-diff:
    if: inputs.gate == 'deterministic-diff'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
      REVIEW_BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate gate inputs
        run: |
          if [[ "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi
          if [[ -z "$REVIEW_BASE_REF" || "$REVIEW_BASE_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid base_ref: $REVIEW_BASE_REF" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install gate tools
        run: just -f "$INFRA/ci/runner.just" install-gate-tools

      - name: Stage PR diff
        run: just -f "$INFRA/ci/runner.just" stage-pr-diff "$REVIEW_BASE_REF"

      - name: Check deterministic diff
        run: just -f "$INFRA/ci/runner.just" check-deterministic-diff

  delegation-conformance:
    if: inputs.gate == 'delegation-conformance'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate gate inputs
        run: |
          if [[ "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install gate tools
        run: just -f "$INFRA/ci/runner.just" install-gate-tools

      - name: Check delegation conformance
        run: just -f "$INFRA/ci/runner.just" check-delegation

  app-boot:
    if: inputs.gate == 'app-boot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate infrastructure clone path
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate gate inputs
        run: |
          if [[ "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install gate tools
        run: just -f "$INFRA/ci/runner.just" install-gate-tools

      - name: Check app boot
        run: just -f "$INFRA/ci/runner.just" check-app-boot

  thread-resolution:
    if: inputs.gate == 'thread-resolution'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      REVIEW_INFRA_REF: ${{ inputs.infra_ref }}
      REVIEW_PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: Locate infrastructure clone path
        run: echo "INFRA=$RUNNER_TEMP/ai-review-ci" >> "$GITHUB_ENV"

      - name: Validate gate inputs
        run: |
          if [[ "$REVIEW_INFRA_REF" =~ [^A-Za-z0-9._/-] ]]; then
            echo "invalid infra_ref: $REVIEW_INFRA_REF" >&2
            exit 1
          fi
          if [[ ! "$REVIEW_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "invalid pull request number: $REVIEW_PR_NUMBER" >&2
            exit 1
          fi

      - name: Clone review infrastructure
        run: git clone --depth 1 --branch "$REVIEW_INFRA_REF" https://github.com/dzackgarza/ai-review-ci.git "$INFRA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install just
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install gate tools
        run: just -f "$INFRA/ci/runner.just" install-gate-tools

      - name: Check review thread resolution
        env:
          GH_TOKEN: ${{ github.token }}
        run: just -f "$INFRA/ci/runner.just" check-review-threads "$REVIEW_PR_NUMBER"
