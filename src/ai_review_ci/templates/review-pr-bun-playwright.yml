name: PR Review
on:
  pull_request: {}
jobs:
  qc-ci:
    uses: dzackgarza/ai-review-ci/.github/workflows/_qc.yml@{{ ref }}
    permissions:
      contents: read
      issues: read
    with:
      tier: test-ci
      infra_ref: '{{ ref }}'
  deterministic-diff:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      actions: read
      issues: read
      pull-requests: read
    with:
      gate: deterministic-diff
      profile: '{{ profile }}'
  delegation-conformance:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      actions: read
      issues: read
      pull-requests: read
    with:
      gate: delegation-conformance
      profile: '{{ profile }}'
  qc-doctor:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      actions: read
      # Label-alignment check reads live labels via `gh label list`
      # (GET /repos/{owner}/{repo}/labels), which requires Issues (read).
      issues: read
      pull-requests: read
    with:
      gate: qc-doctor
      profile: '{{ profile }}'
  app-boot:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      actions: read
      issues: read
      pull-requests: read
    with:
      gate: app-boot
      profile: '{{ profile }}'
  pr-description-checklist:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      pull-requests: read
      actions: read
      issues: read
    with:
      gate: pr-description-checklist
      profile: '{{ profile }}'
  general:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@{{ ref }}
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
      issues: write
    with:
      report_type: general
      scope: diff
  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@{{ ref }}
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
      issues: write
    with:
      report_type: slop
      scope: diff
  thread-resolution:
    needs:
      - general
      - slop
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      pull-requests: read
      actions: read
      issues: read
    with:
      gate: thread-resolution
      profile: '{{ profile }}'
