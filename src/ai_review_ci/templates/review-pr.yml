name: PR Review
on:
  pull_request: {}
jobs:
  deterministic-diff:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
    with:
      gate: deterministic-diff
      profile: '{{ profile }}'
  delegation-conformance:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
    with:
      gate: delegation-conformance
      profile: '{{ profile }}'
  qc-doctor:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      actions: read
    with:
      gate: qc-doctor
      profile: '{{ profile }}'
  general:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@{{ ref }}
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: general
      scope: diff
  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@{{ ref }}
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: slop
      scope: diff
  thread-resolution:
    needs:
      - general
      - slop
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@{{ ref }}
    permissions:
      contents: read
      pull-requests: read
    with:
      gate: thread-resolution
      profile: '{{ profile }}'
