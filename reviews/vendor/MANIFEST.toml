# Ownership manifest for everything vendored into reviews/vendor/.
#
# Two categories, and every vendored entry is in exactly one:
#
#   owned    — authored in THIS repo under skills/<name>/. Built into reviews/vendor/
#              by `just vendor-owned-skills` and installed into a downstream skills hub
#              (e.g. ~/ai) by `just publish-skills`. ai-review-ci is the source of truth;
#              the vendored copy and the ~/ai copy are both downstream artifacts. Never
#              edit the vendored copy directly — edit skills/<name>/ and rebuild.
#              vendor_layout says how the build lays the skill out under reviews/vendor/:
#                nested — reviews/vendor/<name>/{SKILL.md,references/...} + a VENDOR.toml
#                         sha256 manifest (read at runtime by src/ai_review_ci/policy_index.py).
#                flat   — reviews/vendor/<name>.md (from SKILL.md) plus, if the skill has
#                         references, reviews/vendor/<name>-references/ (from references/).
#              The layout is preserved from how each skill was already vendored so the
#              reviewer bundle (reviews/*/manifest.txt) and doc links stay stable.
#
#   consumed — owned by an EXTERNAL upstream and vendored here only so the reviewer prompt
#              can inline it. NOT authored in skills/, NOT built from skills/, NOT published.
#              Refresh by re-vendoring the named upstream file, not by editing here.
#
# See ai-review-ci#163.

[owned.policy-index]
source_path = "skills/policy-index"
vendor_layout = "nested"

[owned.anti-slop]
source_path = "skills/anti-slop"
vendor_layout = "flat"

[owned.reviewing-llm-code]
source_path = "skills/reviewing-llm-code"
vendor_layout = "flat"

[owned.fixing-slop]
source_path = "skills/fixing-slop"
vendor_layout = "flat"

[owned.bespoke-software-policy]
source_path = "skills/bespoke-software-policy"
vendor_layout = "flat"

[consumed.test-guidelines]
upstream_repo = "dzackgarza/ai"
upstream_path = "opencode/skills/test-guidelines/SKILL.md"
vendor_path = "test-guidelines.md"

[consumed.tool-provisioning-and-environment-hygiene]
upstream_repo = "dzackgarza/ai"
upstream_path = "opencode/skills/tool-provisioning-and-environment-hygiene/SKILL.md"
vendor_path = "tool-provisioning-and-environment-hygiene.md"

[consumed.common]
upstream_repo = "hyhmrright/brooks-lint"
upstream_path = "skills/_shared/common.md"
vendor_path = "common.md"

[consumed.source-coverage]
upstream_repo = "hyhmrright/brooks-lint"
upstream_path = "skills/_shared/source-coverage.md"
vendor_path = "source-coverage.md"

[consumed.decay-risks]
upstream_repo = "hyhmrright/brooks-lint"
upstream_path = "skills/_shared/decay-risks.md"
vendor_path = "decay-risks.md"

[consumed.ci-sweep-protocol]
upstream_repo = "hyhmrright/brooks-lint"
# Brooks-Lint CI-sweep protocol doc. Not present in the current upstream snapshot
# (checked marketplace skills/ tree); refresh path must be re-confirmed against upstream.
upstream_path = "unconfirmed"
vendor_path = "ci-sweep-protocol.md"

[consumed.pr-review-guide]
upstream_repo = "hyhmrright/brooks-lint"
upstream_path = "skills/brooks-review/pr-review-guide.md"
vendor_path = "pr-review-guide.md"
