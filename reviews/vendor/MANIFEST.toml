# Ownership manifest for everything vendored into reviews/vendor/.
#
# The split is by ENFORCEMENT PHASE, not by where a doc originally came from:
#
#   owned    — part of this repo's integration-time enforcement surface (the reviewer
#              bundle / QC that fires when code is integrated). Authored and controlled
#              HERE under skills/<name>/, even when the text was originally adopted from an
#              external framework (e.g. the Brooks-Lint composites) — ai-review-ci owns its
#              copy and may diverge from that origin. Built into reviews/vendor/ by
#              `just vendor-owned-skills` and installed into a downstream skills hub
#              (e.g. ~/ai) by `just publish-skills`. Never edit the vendored copy directly;
#              edit skills/<name>/ and rebuild.
#              vendor_layout says how the build lays the skill out under reviews/vendor/:
#                nested — reviews/vendor/<name>/{SKILL.md,references/...} + a VENDOR.toml
#                         sha256 manifest (read at runtime by src/ai_review_ci/policy_index.py).
#                flat   — reviews/vendor/<name>.md (from SKILL.md) plus, if the skill ships
#                         references, reviews/vendor/<name>-references/ (from references/).
#                (absent) — the skill is agent-facing only: loaded during authoring/PR work,
#                         NOT inlined into the reviewer prompt, so it is published to ~/ai but
#                         not built into reviews/vendor.
#              The layout is preserved from how each skill was already vendored so the
#              reviewer bundle (reviews/*/manifest.txt) and doc links stay stable.
#
#   consumed — pre-/during-writing ADVISORY guidance that ~/ai owns (guidance an agent reads
#              before it writes code, not enforcement applied at integration time). Vendored
#              here only so the reviewer prompt can inline it; NOT authored here, NOT built
#              from skills/, NOT published. Refresh from the named upstream with
#              `just refresh-consumed-skills`.
#
# See ai-review-ci#163.

[owned.policy-index]
source_path = "skills/policy-index"
vendor_layout = "nested"

[owned.anti-slop]
source_path = "skills/anti-slop"
vendor_layout = "flat"

[owned.reviewing-llm-code]
source_path = "skills/reviewing-llm-code"
vendor_layout = "flat"

[owned.fixing-slop]
source_path = "skills/fixing-slop"
vendor_layout = "flat"

[owned.bespoke-software-policy]
source_path = "skills/bespoke-software-policy"
vendor_layout = "flat"

[owned.common]
source_path = "skills/common"
vendor_layout = "flat"

[owned.source-coverage]
source_path = "skills/source-coverage"
vendor_layout = "flat"

[owned.decay-risks]
source_path = "skills/decay-risks"
vendor_layout = "flat"

[owned.ci-sweep-protocol]
source_path = "skills/ci-sweep-protocol"
vendor_layout = "flat"

[owned.pr-review-guide]
source_path = "skills/pr-review-guide"
vendor_layout = "flat"

# Agent-facing only (loaded when doing PR/issue work), not part of the reviewer bundle:
# published to ~/ai but not built into reviews/vendor (no vendor_layout).
[owned.git-integration-workflow]
source_path = "skills/git-integration-workflow"

[consumed.test-guidelines]
upstream_repo = "dzackgarza/ai"
upstream_path = "opencode/skills/test-guidelines/SKILL.md"
vendor_path = "test-guidelines.md"

[consumed.tool-provisioning-and-environment-hygiene]
upstream_repo = "dzackgarza/ai"
upstream_path = "opencode/skills/tool-provisioning-and-environment-hygiene/SKILL.md"
vendor_path = "tool-provisioning-and-environment-hygiene.md"
