[tool.diff_cover]
compare_branch = "main"
fail_under = 90

[tool.vulture]
min_confidence = 60
paths = ["src", "tests"]
# Pydantic invokes validator methods by reflection, so vulture cannot see the call
# sites and reports @model_validator/@field_validator/@validator methods as unused.
# Sage's @abstract_method likewise marks declared category interface, dispatched
# (or intentionally unimplemented) rather than called by name.
# Ignore code attached to these decorators globally to clear those false positives.
ignore_decorators = ["@model_validator", "@field_validator", "@validator", "@abstract_method"]
# *_typecheck.py files are never-executed mypy fixtures (typed composition
# checks); their gate is the type checker, so "unused" is false by construction.
exclude = ["*_typecheck.py"]

[tool.deptry]
root = ["src"]

[tool.deptry.package_module_name_map]
ai-slop-detector = "slop_detector"
beautifulsoup4 = "bs4"
markdown-it-py = "markdown_it"
opencv-contrib-python = "cv2"
opencv-python = "cv2"
opencv-python-headless = "cv2"
Pillow = "PIL"
python-dateutil = "dateutil"
python-dotenv = "dotenv"
python-frontmatter = "frontmatter"
python-slugify = "slugify"
pyyaml = "yaml"
PyYAML = "yaml"
pyzmq = "zmq"
sarif-pydantic = "sarif_pydantic"
scikit-image = "skimage"
scikit-learn = "sklearn"
types-pyyaml = "yaml"
types-PyYAML = "yaml"
