rules:
  - id: no-nullish-coalescing
    # POLICY.RUNTIME_DEFAULT targets fail-soft *defaults*: a missing/malformed
    # value silently backfilled with a stub. Match `??` only in default-value
    # position (right operand is a literal stub), not where `??`/`||` is used
    # as a boolean connective in a guard or predicate (#120). Position, not the
    # bare operator, is the signal — matching every `??` produced 80 findings on
    # one small repo, mostly boolean logic, inviting reward-hacking removal of
    # the operator instead of removing the fallback.
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - typescript
      - javascript
    severity: ERROR
    patterns:
      - pattern: $X ?? $FALLBACK
      - metavariable-regex:
          metavariable: $FALLBACK
          # Match a literal-stub right operand — the fail-soft default shape.
          # Empty literals ("", '', ``, [], {}) are ambiguous fail-open containers
          # (missing input / failed fetch / parse failure / no result), NOT valid
          # owned-boundary normalization, so they flag too (#130, POLICY.FAIL_OPEN).
          # Non-literal operands (function calls, identifiers, boolean connectives)
          # do not match and are not flagged (#120 precision).
          regex: '^(?:"[^"]*"|\x27[^\x27]*\x27|\x60[^\x60]*\x60|-?[0-9]+(?:\.[0-9]+)?|true|false|null|\[[\s\S]*\]|\{[\s\S]*\})$'
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: no-const-assignment
    message: POLICY.NO_HIDDEN_CONFIG
    paths:
      exclude:
        - '*config*'
        - '*.config.*'
        - '*.d.ts'
    languages:
      - typescript
      - javascript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern-regex: (?m)^(?:export\s+)?const\s+[A-Z][A-Z0-9_]*(?:URL|URI|ENDPOINT|HOST|PORT|SERVER|DATABASE|COMMAND|CWD|PATH|DIR|DIRECTORY|TIMEOUT|RETRY|THRESHOLD|SECRET|TOKEN)[A-Z0-9_]*\s*=\s*(?:["'`][^"'`]*["'`]|[0-9]+(?:\.[0-9]+)?|\[[^\n]*\]|\{[^\n]*\})
          - pattern-regex: (?m)^(?:export\s+)?const\s+[A-Z][A-Z0-9_]*\s*=\s*["'`](?:https?://|file://)[^"'`]*["'`]
    metadata:
      policy_code: POLICY.NO_HIDDEN_CONFIG
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: rust-no-const
    pattern: 'const $X: $T = $VALUE;'
    message: POLICY.NO_HIDDEN_CONFIG
    paths:
      exclude:
        - '*config*'
    languages:
      - rust
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_HIDDEN_CONFIG
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: rust-no-static
    pattern: 'static $X: $T = $VALUE;'
    message: POLICY.NO_HIDDEN_CONFIG
    paths:
      exclude:
        - '*config*'
    languages:
      - rust
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_HIDDEN_CONFIG
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: no-double-cast
    # #46: arbitrary double casts stay blocked. Runtime/type-surface mismatches
    # must use the explicit runtimeBoundaryCast form below so the local code
    # carries both a runtime predicate and source-backed issue/URL justification.
    pattern: $X as $T as $Z
    message: POLICY.NO_TYPE_ESCAPE
    languages:
      - typescript
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_TYPE_ESCAPE
      remediation_code: REMEDIATE.STRUCTURED_TYPES
  - id: no-unproven-boundary-cast
    # #46 sanctioned boundary form:
    # runtimeBoundaryCast<T>(value, predicate, "issue/url-backed reason").
    # The predicate is runtime evidence; the reason links the known mismatch.
    message: POLICY.NO_TYPE_ESCAPE
    languages:
      - typescript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: runtimeBoundaryCast<$T>($VALUE)
          - pattern: runtimeBoundaryCast<$T>($VALUE, $PRED)
          - pattern: runtimeBoundaryCast<$T>($VALUE, $PRED, "")
          - pattern: runtimeBoundaryCast<$T>($VALUE, $PRED, '')
          - patterns:
              - pattern: runtimeBoundaryCast<$T>($VALUE, $PRED, $REASON)
              - metavariable-regex:
                  metavariable: $REASON
                  regex: '^["''`](?![\s\S]*(?:#[0-9]+|https?://|issue[ -][0-9]+))[\s\S]*["''`]$'
    metadata:
      policy_code: POLICY.NO_TYPE_ESCAPE
      remediation_code: REMEDIATE.STRUCTURED_TYPES
  - id: no-first-element-child-hydration
    pattern: $X.firstElementChild !== null
    message: POLICY.NO_HELPER_PROOF
    languages:
      - typescript
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_HELPER_PROOF
      remediation_code: REMEDIATE.REAL_PROOF_LOOP
  - id: no-status-only-assertion
    message: POLICY.NO_EXACT_STRING_PROOF
    languages:
      - typescript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern-regex: expect\([^\n]*\.status\)\.toBe\(200\);\s*\n\s*\}\);
          - pattern-regex: expect\([^\n]*\.status\(\)\)\.toBe\(200\);\s*\n\s*\}\);
    metadata:
      policy_code: POLICY.NO_EXACT_STRING_PROOF
      remediation_code: REMEDIATE.REAL_PROOF_LOOP
  - id: rust-silenced-result
    pattern: let _ = $EXPR;
    message: POLICY.NO_ERROR_DISCARD
    languages:
      - rust
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_ERROR_DISCARD
      remediation_code: REMEDIATE.FAIL_LOUD_BOUNDARY
  - id: py-no-getenv-default
    pattern: os.getenv($KEY, $DEFAULT)
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-dict-get-default
    pattern: $DICT.get($KEY, $DEFAULT)
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-getattr-default
    pattern: getattr($OBJ, $ATTR, $DEFAULT)
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-setdefault-consumed
    pattern-either:
      - pattern: $TARGET = $DICT.setdefault($KEY, $DEFAULT)
      - pattern: return $DICT.setdefault($KEY, $DEFAULT)
      - pattern: 'if $DICT.setdefault($KEY, $DEFAULT): ...'
      - pattern: 'while $DICT.setdefault($KEY, $DEFAULT): ...'
      - pattern: $DICT.setdefault($KEY, $DEFAULT).$METHOD(...)
      - pattern: $FUNC(..., $DICT.setdefault($KEY, $DEFAULT), ...)
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-setdefault-runtime-mapping
    patterns:
      - pattern: $DICT.setdefault($KEY, $DEFAULT)
      - metavariable-regex:
          metavariable: $DICT
          regex: (?i).*(config|state|input|payload|request|response|settings|options|env|context|mapping|data).*
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-defaultdict
    pattern: defaultdict($TYPE)
    message: POLICY.RUNTIME_DEFAULT
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.RUNTIME_DEFAULT
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-optional-type
    pattern-either:
      - pattern: '$VAR: Optional[$TYPE]'
      - pattern: '$VAR: $TYPE | None'
    message: POLICY.TOTAL_CORE_STATE
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.TOTAL_CORE_STATE
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: py-no-try-import
    pattern: "try:\n    import $MOD\nexcept ImportError:\n    ..."
    message: POLICY.CRITICAL_DEPENDENCY
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.CRITICAL_DEPENDENCY
      remediation_code: REMEDIATE.FAIL_LOUD_BOUNDARY
  - id: py-no-hardcoded-env-var
    pattern: os.environ[$KEY] = $VALUE
    message: POLICY.NO_HIDDEN_CONFIG
    languages:
      - python
    severity: ERROR
    metadata:
      policy_code: POLICY.NO_HIDDEN_CONFIG
      remediation_code: REMEDIATE.TOTAL_CONFIG_MODEL
  - id: ts-no-hardcoded-env-var
    pattern-either:
      - pattern: process.env.$KEY = $VALUE
      - pattern: process.env[$KEY] = $VALUE
    message: POLICY.NO_HIDDEN_CONFIG
    languages:
