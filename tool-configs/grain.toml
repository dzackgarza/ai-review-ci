[grain]
# OBVIOUS_COMMENT is warn-only: its heuristic misfires on prose-commented
# mathematical code (flagged a section header inside __all__ and the
# continuation line of a two-line comment as "obvious").
fail_on = ["NAKED_EXCEPT", "HEDGE_WORD", "VAGUE_TODO", "VAGUE_COMMIT", "AND_COMMIT", "NO_CONTEXT", "GENERIC_VARNAME"]
warn_only = ["OBVIOUS_COMMENT", "RESTATED_DOCSTRING", "SINGLE_IMPL_ABC", "TABLE_OVERKILL", "TAG_COMMENT", "THANKS_OPENER"]
exclude = [
    "**/lexicon/**",
    "lexicon/**",
    "tests/*",
    "*_test.py",
    "test_*.py",
    "*.sage.py",
    "src/external/**",
    "src/backends/external/**",
    "theory/literature/**",
    "theory/references/literature/**",
    "tests/fixtures/slop-torture/*",
    "**/tests/fixtures/slop-torture/**",
    "tests/fixtures/ast-grep/*",
    "**/tests/fixtures/ast-grep/**",
    "node_modules/*",
    "**/node_modules/**",
    ".venv/*",
    "**/.venv/**",
    ".pytest_cache/*",
    "**/.pytest_cache/**",
    ".import_linter_cache/*",
    "**/.import_linter_cache/**",
    "__pycache__/*",
    "**/__pycache__/**",
    "dist/*",
    "**/dist/**",
    "build/*",
    "**/build/**",
    "coverage/*",
    "**/coverage/**",
    "_ci-support/*",
    "**/_ci-support/**",
    "codeql-db/*",
    "**/codeql-db/**",
    "tool-artifacts/models/*",
    "**/tool-artifacts/models/**",
    "@girs/*",
    "**/@girs/**",
    "__stubs__/*",
    "**/__stubs__/**",
    "external/*",
    "**/external/**",
    "target/*",
    "**/target/**",
    "*.bak/*",
    "**/*.bak/**",
    ".git/*",
    "**/.git/**",
    ".next/*",
    "**/.next/**",
    ".lake/*",
    "**/.lake/**",
    ".worktrees/*",
    "**/.worktrees/**",
    ".claude/worktrees/*",
    "**/.claude/worktrees/**",
    "vendor/*",
    "**/vendor/**",
    "third_party/*",
    "**/third_party/**",
    "venv/*",
    "**/venv/**",
    "archives/*",
    "**/archives/**",
    "src.bak/*",
    "**/src.bak/**",
    "scripts/*",
    "**/scripts/**",
    "notebooks/*",
    "**/notebooks/**",
]

[grain.python]
generic_varnames = ["process_data", "handle_response", "get_result", "do_thing", "process_item", "handle_input", "get_data", "process_request"]

[grain.markdown]
hedge_words = ["robust", "seamless", "leverage", "cutting-edge", "powerful", "you might want to", "consider using", "it's worth noting", "note that"]

[[grain.custom_rules]]
name     = "PROS_CONS"
pattern  = '(?i)\b(pros?|cons?|trade.?off|advantage|disadvantage|benefit|drawback|downside|upside|strength|weakness|consideration|caveat|however|although|on the other hand|alternatively|that said|note that|keep in mind|be aware|worth noting)\b'
files    = "*.md"
message  = "Pros/cons or hedging language found in documentation. Documentation records decisions and code, not sales pitches or deliberations. Remove evaluative framing — state what is, not what might be weighed."
severity = "error"
