# Global Ruff Configuration (Strict)

# Exclude a variety of commonly ignored directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Standard formatting
line-length = 88
indent-width = 4

# Target Python 3.14 (latest stable)
target-version = "py314"

[lint]
# Enable standard rules
select = ["E", "F", "I", "UP"]
ignore = ["E741", "UP049"]  # see planning/README.md for justification

# Enforce strictness: fix everything
fixable = ["ALL"]
