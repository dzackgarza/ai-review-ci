# Maximally strict production config for ai-slop-detector
# Based on AI-SLOP-Detector Strict Mode + maximally informative extensions
# https://github.com/flamehaven01/AI-SLOP-Detector/blob/main/docs/CONFIGURATION.md
weights:
  ldr: 0.5
  inflation: 0.3
  ddc: 0.2
thresholds:
  ldr:
    critical: 0.4
    warning: 0.7
  inflation:
    critical: 0.8
    warning: 0.4
  ddc:
    critical: 0.6
    warning: 0.8
patterns:
  disabled: []
evidence:
  tests:
    integration:
      enabled: true
      dir_patterns:
      - tests/integration/**
      - integration_tests/**
      - tests/e2e/**
      - e2e/**
      file_patterns:
      - test_integration_*.py
      - '*_integration_test.py'
      - it_*.py
      pytest_markers:
      - integration
      - e2e
      - slow
      runtime_signals:
        enabled: true
        keywords:
        - testcontainers
        - docker-compose
        - TestClient
claims:
  production_ready:
    require_integration_tests: true
    require_unit_tests: true
    require_error_handling: true
    require_logging: true
  enterprise_grade:
    require_integration_tests: true
    require_monitoring: true
    require_security: true
reporting:
  formats:
  - text
  - json
  - html
  html:
    theme: dark
    show_charts: true
  ci:
    fail_threshold: 30
    fail_on_critical: true
ignore:
- '**/tests/fixtures/slop-torture/**'
- '**/tests/fixtures/ast-grep/**'
- '**/node_modules/**'
- '**/.venv/**'
- '**/.pytest_cache/**'
- '**/.import_linter_cache/**'
- '**/__pycache__/**'
- '**/dist/**'
- '**/build/**'
- '**/coverage/**'
- '**/_ci-support/**'
- '**/codeql-db/**'
- '**/tool-artifacts/models/**'
- '**/@girs/**'
- '**/__stubs__/**'
- '**/external/**'
- '**/target/**'
- '**/*.bak/**'
- '**/.git/**'
- '**/.next/**'
- '**/.lake/**'
- '**/.worktrees/**'
- '**/.claude/worktrees/**'
- '**/vendor/**'
- '**/third_party/**'
- '**/venv/**'
- '**/archives/**'
- '**/src.bak/**'
- '**/scripts/**'
- '**/notebooks/**'
- '**/notes/**'
