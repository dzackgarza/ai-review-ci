# Global Mypy Configuration
[mypy]
python_version = 3.14
mypy_path = typings
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

[mypy-slop_detector.*]
ignore_missing_imports = True

# SageMath ships no type stubs and is never installed in the uvx mypy
# environment, so sage.* imports can only resolve to "missing" in Sage-tier
# projects (justfiles/sage.just reuses this config).
[mypy-sage.*]
ignore_missing_imports = True

# fpylll (lattice-reduction backend used from Sage) also ships no stubs.
[mypy-fpylll.*]
ignore_missing_imports = True
