# Coverage contract for Sage projects (sage.just _sage-pytest-coverage).
# Differs from coverage.ini only where the Sage layout forces it: the package
# root IS the project directory (no src/), tests are preparsed .sage files run
# from a tempdir (excluded by path automatically), and *_typecheck.py files
# are never-executed mypy fixtures.
[run]
branch = True
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */.venv/*
    *_typecheck.py
    */typings/*

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:

[xml]
output = coverage.xml
